name: Build fnOS Package

on:
  push:
    branches:
      - main
      - 'dev_*'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            platform: x86
            suffix: x86
          - goarch: arm64
            platform: arm
            suffix: arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Update manifest version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/^version.*=.*/version      = ${VERSION}/" fnos-app/manifest
          echo "Updated manifest version to ${VERSION}"

      - name: Set manifest platform
        run: |
          if [ "${{ matrix.platform }}" = "arm" ]; then
            sed -i '/^arch.*=.*/d' fnos-app/manifest
          fi
          sed -i "s/^platform.*=.*/platform        = ${{ matrix.platform }}/" fnos-app/manifest
          cat fnos-app/manifest

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags "-s -w" -o fnos-app/app/watchcow ./cmd/watchcow
          chmod +x fnos-app/app/watchcow
          chmod +x fnos-app/cmd/*

      - name: Download fnpack
        run: |
          curl -L -o /tmp/fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.0-linux-amd64
          chmod +x /tmp/fnpack

      - name: Build fpk package
        run: |
          cd fnos-app
          /tmp/fnpack build
          mv watchcow.fpk ../watchcow-${{ matrix.suffix }}.fpk

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: watchcow-${{ matrix.suffix }}-package
          path: watchcow-${{ matrix.suffix }}.fpk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            watchcow-x86.fpk
            watchcow-arm.fpk
          generate_release_notes: true
